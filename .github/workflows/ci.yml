name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main, master]
    # Skip when only repo-root conformance JSON changes (artifact refresh commits).
    paths-ignore:
      - "conformance-certificate.json"
      - "conformance-report.json"

permissions:
  contents: read

jobs:
  test-and-quality:
    name: Tox (static + audit + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout API repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # was `@v6`

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # was `@v6`
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Resolve pinned intentproof-spec revision
        id: spec_pin
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import re
          import sys
          import tomllib
          from pathlib import Path

          raw = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["tool"]["intentproof"]["spec-commit"]
          c = str(raw).strip()
          if not re.fullmatch(r"[0-9a-f]{40}", c, flags=re.IGNORECASE):
              print(
                  "::error::[tool.intentproof].spec-commit must be a full 40-character hex commit SHA "
                  "(immutable ref), not a branch or tag name.",
                  file=sys.stderr,
              )
              print(f"::error::Invalid spec-commit value: {raw!r}", file=sys.stderr)
              sys.exit(1)
          c = c.lower()
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"sha={c}\n")
          PY

      - name: Checkout intentproof-spec
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # was `@v6`
        with:
          repository: IntentProof/intentproof-spec
          ref: ${{ steps.spec_pin.outputs.sha }}
          fetch-depth: 0
          path: intentproof-spec

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tox
        env:
          INTENTPROOF_SPEC_ROOT: ${{ github.workspace }}/intentproof-spec
        run: python -m tox -q
