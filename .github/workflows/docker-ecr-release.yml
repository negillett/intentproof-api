# Build linux/amd64 image and push to AWS ECR on semver release tags (vX.Y.Z).
# Requires repository secret AWS_ECR_PUSH_ROLE_ARN (OIDC role from intentproof-infra stack output).
#
# Optional — sync TF_VAR_IMAGE_TAG on intentproof-infra after a successful push (continue-on-error):
# Preferred: GitHub App (org-owned, repo-scoped installation on intentproof-infra only):
#   Variables: INTENTPROOF_INFRA_GITHUB_APP_ID
#   Secrets:    INTENTPROOF_INFRA_GITHUB_APP_PRIVATE_KEY (PEM)
#   Optional vars: INTENTPROOF_INFRA_GITHUB_APP_OWNER (default IntentProof),
#                   INTENTPROOF_INFRA_GITHUB_APP_REPOSITORY (repo short name, default intentproof-infra)
# Fallback: fine-grained PAT INTENTPROOF_INFRA_GH_WRITE_TOKEN (Secrets write on intentproof-infra).
# Optional: INTENTPROOF_INFRA_REPO — full owner/name for gh secret set (default IntentProof/intentproof-infra).

name: Release — Docker to ECR

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: intentproof-api-ecr-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_NAME: intentproof-api

jobs:
  push:
    name: Build and push
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.3.0

      - name: Require semver tag vX.Y.Z
        run: |
          set -euo pipefail
          ref="${GITHUB_REF_NAME}"
          if [[ ! "${ref}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::This workflow only publishes semver tags vMAJOR.MINOR.PATCH (no pre-release suffix). Got: ${ref}"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ECR_PUSH_ROLE_ARN }}
          mask-aws-account-id: true

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071aed4fc00d3559d3011cf04b # v2.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a000041ab758af5e300aed1deb31243d0c2 # v3.10.0

      - name: Build and push (linux/amd64)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          image="${REGISTRY}/${ECR_REPOSITORY_NAME}:${TAG}"
          docker buildx build \
            --platform linux/amd64 \
            --push \
            -t "${image}" \
            .

      - name: Job summary
        if: success()
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ github.ref_name }}
          REPO_NAME: intentproof-api
        run: |
          {
            echo "### ECR image"
            echo
            echo "Pushed **\`${REGISTRY}/${REPO_NAME}:${TAG}\`** (platform **linux/amd64**)."
            echo
            echo "**Infra:** next step tries **GitHub App** (variables **\`INTENTPROOF_INFRA_GITHUB_APP_ID\`** + secret **\`INTENTPROOF_INFRA_GITHUB_APP_PRIVATE_KEY\`**) or legacy **\`INTENTPROOF_INFRA_GH_WRITE_TOKEN\`** PAT to set **\`TF_VAR_IMAGE_TAG=${TAG}\`** on **intentproof-infra**. Sync uses **continue-on-error** so credential or network issues cannot fail this job after a successful push."
            echo
            echo "Roll **ECS**: run **intentproof-infra** **Terraform** **apply** (manual) so the task definition picks up the new tag — see **intentproof-infra** **\`docs/DEPLOYMENT.md\`**."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Mint GitHub App token for intentproof-infra (optional)
        id: infra-app-token
        if: success() && vars.INTENTPROOF_INFRA_GITHUB_APP_ID != ''
        continue-on-error: true
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.INTENTPROOF_INFRA_GITHUB_APP_ID }}
          private-key: ${{ secrets.INTENTPROOF_INFRA_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ vars.INTENTPROOF_INFRA_GITHUB_APP_OWNER || 'IntentProof' }}
          repositories: ${{ vars.INTENTPROOF_INFRA_GITHUB_APP_REPOSITORY || 'intentproof-infra' }}
          permission-metadata: read
          permission-secrets: write

      - name: Sync TF_VAR_IMAGE_TAG on intentproof-infra (optional)
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN_FROM_APP: ${{ steps.infra-app-token.outputs.token }}
          GH_TOKEN_FROM_PAT: ${{ secrets.INTENTPROOF_INFRA_GH_WRITE_TOKEN }}
          TAG: ${{ github.ref_name }}
          INFRA_REPO: ${{ vars.INTENTPROOF_INFRA_REPO }}
        run: |
          set -euo pipefail
          if [ -n "${GH_TOKEN_FROM_APP}" ]; then
            export GH_TOKEN="${GH_TOKEN_FROM_APP}"
            echo "Using GitHub App installation token for intentproof-infra secret sync."
          elif [ -n "${GH_TOKEN_FROM_PAT}" ]; then
            export GH_TOKEN="${GH_TOKEN_FROM_PAT}"
            echo "Using INTENTPROOF_INFRA_GH_WRITE_TOKEN for intentproof-infra secret sync."
          else
            echo "Skipping intentproof-infra TF_VAR_IMAGE_TAG sync (no INTENTPROOF_INFRA_GITHUB_APP_ID + private key, and no INTENTPROOF_INFRA_GH_WRITE_TOKEN)."
            exit 0
          fi
          repo="${INFRA_REPO:-IntentProof/intentproof-infra}"
          gh secret set TF_VAR_IMAGE_TAG --repo "${repo}" -b "${TAG}"
          echo "Updated TF_VAR_IMAGE_TAG on ${repo} to ${TAG} (repository secret)."
