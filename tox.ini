[tox]
env_list =
    static
    audit
    cov
    py312
isolated_build = true
skip_missing_interpreters = true

[testenv]
package = editable
extras =
    dev
commands_pre =
    python -m pip install -U "pip>=26.1"
commands =
    pytest tests {posargs}

[testenv:static]
extras =
    dev
setenv =
    INTENTPROOF_SPEC_ROOT = {env:INTENTPROOF_SPEC_ROOT:}
commands =
    bash {toxinidir}/scripts/check-spec-pin.sh {env:INTENTPROOF_SPEC_ROOT:}
    bash {toxinidir}/scripts/verify-generated-models.sh
    ruff format --check {toxinidir}/alembic {toxinidir}/app {toxinidir}/examples {toxinidir}/tests
    ruff check {toxinidir}/alembic {toxinidir}/app {toxinidir}/examples {toxinidir}/tests
allowlist_externals = bash

[testenv:audit]
description = CVE scan (pip-audit / PyPI advisory DB)
extras =
    dev
commands =
    pip-audit {posargs}

[testenv:cov]
description = pytest with 100% line coverage gate
extras =
    dev
commands =
    pytest tests --cov=app --cov-report=term-missing --cov-fail-under=100 {posargs}
